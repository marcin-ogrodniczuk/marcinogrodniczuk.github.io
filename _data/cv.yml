    Projects:
      - name: Clinical Deterioration Prediction Capstone
        summary: Built an end-to-end machine learning workflow using longitudinal EHR-style data to predict progression to a critical condition.
        highlights:
          - Performed EDA, missing-value review, outlier review, feature engineering, supervised model comparison, cross-validation, and early-window testing.
