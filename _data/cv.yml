          - Built a Streamlit model interface for interactive risk prediction.

      - name: RAG Pipeline for Biomedical Literature
        start_date: 2026-05
        end_date: 2026-05
        summary: Built a retrieval-augmented generation pipeline that ingests PubMed abstracts and answers natural-language questions with inline citations.
        highlights:
          - Implemented NCBI Entrez ingestion, semantic chunking, embeddings, ChromaDB vector search, and local LLM generation with Ollama.
          - Indexed 154 chunks from more than 100 PubMed abstracts.

      - name: Healthcare No-Show Prediction & Patient Utilization Analytics
        start_date: 2026-04
        end_date: 2026-05
        summary: Built an analytics and machine learning pipeline using EHR and scheduling data to identify drivers of patient no-shows and predict risk.
        highlights:
          - Used SQL and Python for data modeling, EDA, and machine learning.
          - Deployed insights through an interactive Streamlit dashboard.
          - XGBoost model achieved 88% accuracy and 0.76 F1 score.

